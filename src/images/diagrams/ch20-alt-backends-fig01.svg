<g class="label" style="" transform="translate(0, -16.200000762939453)"><rect/><g><rect class="background" style="stroke: none"/><text y="-10.1" style=""><tspan class="text-outer-tspan row" x="0" y="-0.1em" dy="1.1em"><tspan font-style="normal" class="text-inner-tspan" font-weight="normal">LLVM:</tspan><tspan font-style="normal" class="text-inner-tspan" font-weight="normal"> heavy</tspan><tspan font-style="normal" class="text-inner-tspan" font-weight="normal"> optimization,</tspan><tspan font-style="normal" class="text-inner-tspan" font-weight="normal"> broad</tspan></tspan><tspan class="text-outer-tspan row" x="0" y="1em" dy="1.1em"><tspan font-style="normal" class="text-inner-tspan" font-weight="normal">targets,</tspan><tspan font-style="normal" class="text-inner-tspan" font-weight="normal"> the</tspan><tspan font-style="normal" class="text-inner-tspan" font-weight="normal"> default</tspan></tspan></text></g></g></g><g class="node default" id="my-svg-flowchart-CL-3" data-look="classic" transform="translate(487.513671875, 342.0687484741211)"><rect class="basic label-container" style="" x="-158.873046875" y="-43.599998474121094" width="317.74609375" height="87.19999694824219"/><g class="label" style="" transform="translate(0, -31.599998474121094)"><rect/><g><rect class="background" style="stroke: none"/><text y="-10.1" style=""><tspan class="text-outer-tspan row" x="0" y="-0.1em" dy="1.1em"><tspan font-style="normal" class="text-inner-tspan" font-weight="normal">Cranelift:</tspan><tspan font-style="normal" class="text-inner-tspan" font-weight="normal"> quick</tspan><tspan font-style="normal" class="text-inner-tspan" font-weight="normal"> codegen,</tspan><tspan font-style="normal" class="text-inner-tspan" font-weight="normal"> mediocre</tspan></tspan><tspan class="text-outer-tspan row" x="0" y="1em" dy="1.1em"><tspan font-style="normal" class="text-inner-tspan" font-weight="normal">code</tspan></tspan><tspan class="text-outer-tspan row" x="0" y="2.1em" dy="1.1em"><tspan font-style="normal" class="text-inner-tspan" font-weight="normal">~20%</tspan><tspan font-style="normal" class="text-inner-tspan" font-weight="normal"> less</tspan><tspan font-style="normal" class="text-inner-tspan" font-weight="normal"> codegen</tspan><tspan font-style="normal" class="text-inner-tspan" font-weight="normal"> time,</tspan><tspan font-style="normal" class="text-inner-tspan" font-weight="normal"> ~14%</tspan><tspan font-style="normal" class="text-inner-tspan" font-weight="normal"> slower</tspan></tspan><tspan class="text-outer-tspan row" x="0" y="3.2em" dy="1.1em"><tspan font-style="normal" class="text-inner-tspan" font-weight="normal">runtime</tspan></tspan></text></g></g></g><g class="node default" id="my-svg-flowchart-GCC-5" data-look="classic" transform="translate(843.1103515625, 342.0687484741211)"><rect class="basic label-container" style="" x="-162.7236328125" y="-35.89999961853027" width="325.447265625" height="71.79999923706055"/><g class="label" style="" transform="translate(0, -23.899999618530273)"><rect/><g><rect class="background" style="stroke: none"/><text y="-10.1" style=""><tspan class="text-outer-tspan row" x="0" y="-0.1em" dy="1.1em"><tspan font-style="normal" class="text-inner-tspan" font-weight="normal">GCC</tspan><tspan font-style="normal" class="text-inner-tspan" font-weight="normal"> (rustc_codegen_gcc</tspan><tspan font-style="normal" class="text-inner-tspan" font-weight="normal"> via</tspan></tspan><tspan class="text-outer-tspan row" x="0" y="1em" dy="1.1em"><tspan font-style="normal" class="text-inner-tspan" font-weight="normal">libgccjit):</tspan></tspan><tspan class="text-outer-tspan row" x="0" y="2.1em" dy="1.1em"><tspan font-style="normal" class="text-inner-tspan" font-weight="normal">targets</tspan><tspan font-style="normal" class="text-inner-tspan" font-weight="normal"> LLVM</tspan><tspan font-style="normal" class="text-inner-tspan" font-weight="normal"> lacks,</tspan><tspan font-style="normal" class="text-inner-tsp