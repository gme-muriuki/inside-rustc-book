<svg id="my-svg" width="987.271484375" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" class="flowchart" height="120.39999389648438" viewBox="0 0 987.271484375 120.39999389648438" role="graphics-document document" aria-roledescription="flowchart-v2" aria-describedby="chart-desc-my-svg" aria-labelledby="chart-title-my-svg" style="background-color: transparent;"><title id="chart-title-my-svg">One Body, two views: dump versus probe</title><desc id="chart-desc-my-svg">A single arena-allocated Body is rendered two ways, by -Zunpretty=mir as a textual dump (the observation window) and by reading tcx.optimized_mir basic_blocks directly (the control room), with both views expected to agree.</desc><style>#my-svg{font-family:'JetBrains Mono','SF Mono','Berkeley Mono','Consolas','DejaVu Sans Mono',monospace;font-size:14px;fill:#1a1a1a;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#my-svg .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#my-svg .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#my-svg .error-icon{fill:#FBF7F0;}#my-svg .error-text{fill:#04080f;stroke:#04080f;}#my-svg .edge-thickness-normal{stroke-width:1px;}#my-svg .edge-thickness-thick{stroke-width:3.5px;}#my-svg .edge-pattern-solid{stroke-dasharray:0;}#my-svg .edge-thickness-invisible{stroke-width:0;fill:none;}#my-svg .edge-pattern-dashed{stroke-dasharray:3;}#my-svg .edge-pattern-dotted{stroke-dasharray:2;}#my-svg .marker{fill:#1a1a1a;stroke:#1a1a1a;}#my-svg .marker.cross{stroke:#1a1a1a;}#my-svg svg{font-family:'JetBrains Mono','SF Mono','Berkeley Mono','Consolas','DejaVu Sans Mono',monospace;font-size:14px;}#my-svg p{margin:0;}#my-svg .label{font-family:'JetBrains Mono','SF Mono','Berkeley Mono','Consolas','DejaVu Sans Mono',monospace;color:#1a1a1a;}#my-svg .cluster