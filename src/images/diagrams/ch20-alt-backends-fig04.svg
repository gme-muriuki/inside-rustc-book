n><tspan class="text-outer-tspan row" x="0" y="2.1em" dy="1.1em"><tspan font-style="normal" class="text-inner-tspan" font-weight="normal">call,</tspan><tspan font-style="normal" class="text-inner-tspan" font-weight="normal"> NO</tspan><tspan font-style="normal" class="text-inner-tspan" font-weight="normal"> FFI</tspan></tspan></text></g></g></g><g class="node default" id="my-svg-flowchart-LIR-5" data-look="classic" transform="translate(159.03125, 236.39999771118164)"><rect class="basic label-container" style="" x="-151.03125" y="-20.5" width="302.0625" height="41"/><g class="label" style="" transform="translate(0, -8.5)"><rect/><g><rect class="background" style="stroke: none"/><text y="-10.1" style=""><tspan class="text-outer-tspan row" x="0" y="-0.1em" dy="1.1em"><tspan font-style="normal" class="text-inner-tspan" font-weight="normal">LLVM</tspan><tspan font-style="normal" class="text-inner-tspan" font-weight="normal"> IR</tspan><tspan font-style="normal" class="text-inner-tspan" font-weight="normal"> →</tspan><tspan font-style="normal" class="text-inner-tspan" font-weight="normal"> heavy</tspan><tspan font-style="normal" class="text-inner-tspan" font-weight="normal"> optimize</tspan><tspan font-style="normal" class="text-inner-tspan" font-weight="normal"> →</tspan><tspan font-style="normal" class="text-inner-tspan" font-weight="normal"> object</tspan></tspan></text></g></g></g><g class="node default" id="my-svg-flowchart-CIR-7" data-look="classic" transform="translate(499.0830078125, 236.39999771118164)"><rect class="basic label-container" style="" x="-155.0205078125" y="-28.200000762939453" width="310.041015625" height="56.400001525878906"/><g class="label" style="" transform="translate(0, -16.200000762939453)"><rect/><g><rect class="background" style="stroke: none"/><text y="-10.1" style=""><tspan class="text-outer-tspan row" x="0" y="-0.1em" dy="1.1em"><tspan font-style="normal" class="text-inner-tspan" font-weight="normal">Cranelift</tspan><tspan font-style="n