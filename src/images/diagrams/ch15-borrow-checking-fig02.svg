<svg id="my-svg" width="695.201171875" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" class="flowchart" height="257.1999969482422" viewBox="0 0 695.201171875 257.1999969482422" role="graphics-document document" aria-roledescription="flowchart-v2" aria-describedby="chart-desc-my-svg" aria-labelledby="chart-title-my-svg" style="background-color: transparent;"><title id="chart-title-my-svg">Lexical lifetimes vs NLL</title><desc id="chart-desc-my-svg">Under the old lexical model a borrow extends to the end of the enclosing block and collides with a later v.push(4); under NLL the region ends at the reference's last use so the mutation is accepted.</desc><style>#my-svg{font-family:'JetBrains Mono','SF Mono','Berkeley Mono','Consolas','DejaVu Sans Mono',monospace;font-size:14px;fill:#1a1a1a;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#my-svg .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#my-svg .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#my-svg .error-icon{fill:#FBF7F0;}#my-svg .error-text{fill:#04080f;stroke:#04080f;}#my-svg .edge-thickness-normal{stroke-width:1px;}#my-svg .edge-thickness-thick{stroke-width:3.5px;}#my-svg .edge-pattern-solid{stroke-dasharray:0;}#my-svg .edge-thickness-invisible{stroke-width:0;fill:none;}#my-svg .edge-pattern-dashed{stroke-dasharray:3;}#my-svg .edge-pattern-dotted{stroke-dasharray:2;}#my-svg .marker{fill:#1a1a1a;stroke:#1a1a1a;}#my-svg .marker.cross{stroke:#1a1a1a;}#my-svg svg{font-family:'JetBrains Mono','SF Mono','Berkeley Mono','Consolas','DejaVu Sans Mono',monospace;font-size:14px;}#my-svg p{margin:0;}#my-svg .label{font-family:'JetBrains Mono','SF Mono','Berkeley Mono','Consolas','DejaVu Sans Mono',monospace;color:#1a1a1a;}#my-svg .cluster-label text{fill:#1a1a1a;}#my-svg .cluster-label span{color:#1a1a1a;}#my-svg .cluster-label span p{background-color:transparent;}#my-svg .label text,#my-svg span{fill:#1a1a1a;color:#1a1a1a;}#my-svg .node rect,#my-svg .node circle,#my-svg .node ellipse,#my-svg .node polygon,#my-svg .node path{fill:#FBF7F0;stroke:#1a1a1a;stroke-width:1px;}#my-svg .rough-node .label text,#my-svg .node .label text,#my-svg .image-shape .label,#my-svg .icon-shape .label{text-anchor:middle;}#my-svg .node .katex path{fill:#000;stroke:#000;stroke-width:1px;}#my-svg .rough-node .label,#my-svg .node .label,#my-svg .image-shape .label,#my-svg .icon-shape .label{text-align:center;}#my-svg .node.clickable{cursor:pointer;}#my-svg .root .anchor path{fill:#1a1a1a!important;stroke-width:0;stroke:#1a1a1a;}#my-svg .arrowheadPath{fill:#0b0b0b;}#my-svg .edgePath .path{stroke:#1a1a1a;stroke-width:1px;}#my-svg .flowchart-link{stroke:#1a1a1a;fill:none;}#my-svg .edgeLabel{background-color:#FBF7F0;text-align:center;}#my-svg .edgeLabel p{background-color:#FBF7F0;}#my-svg .edgeLabel rect{opacity:0.5;background-color:#FBF7F0;fill:#FBF7F0;}#my-svg .labelBkg{background-color:rgba(251, 247, 240, 0.5);}#my-svg .cluster rect{fill:#F5EFE6;stroke:#1a1a1a;stroke-width:1px;}#my-svg .cluster text{fill:#1a1a1a;}#my-svg .cluster span{color:#1a1a1a;}#my-svg div.mermaidTooltip{position:absolute;text-align:center;max-width:200px;padding:2px;font-family:'JetBrains Mono','SF Mono','Berkeley Mono','Consolas','DejaVu Sans Mono',monospace;font-size:12px;background:#FBF7F0;border:1px solid hsl(38.1818181818, 17.8947368421%, 86.2745098039%);border-radius:2px;pointer-events:none;z-index:100;}#my-svg .flowchartTitleText{text-anchor:middle;font-size:18px;fill:#1a1a1a;}#my-svg rect.text{fill:none;stroke-width:0;}#my-svg .icon-shape,#my-svg .image-shape{background-color:#FBF7F0;text-align:center;}#my-svg .icon-shape p,#my-svg .image-shape p{background-color:#FBF7F0;padding:2px;}#my-svg .icon-shape .label rect,#my-svg .image-shape .label rect{opacity:0.5;background-color:#FBF7F0;fill:#FBF7F0;}#my-svg .label-icon{display:inline-block;height:1em;overflow:visible;vertical-align:-0.125em;}#my-svg .node .label-icon path{fill:currentColor;stroke:revert;stroke-width:revert;}#my-svg .node .neo-node{stroke:#1a1a1a;}#my-svg [data-look="neo"].node rect,#my-svg [data-look="neo"].cluster rect,#my-svg [data-look="neo"].node polygon{stroke:url(#my-svg-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#my-svg [data-look="neo"].node path{stroke:url(#my-svg-gradient);stroke-width:1px;}#my-svg [data-look="neo"].node .outer-path{filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#my-svg [data-look="neo"].node .neo-line path{stroke:#1a1a1a;filter:none;}#my-svg [data-look="neo"].node circle{stroke:url(#my-svg-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#my-svg [data-look="neo"].node circle .state-start{fill:#000000;}#my-svg [data-look="neo"].icon-shape .icon{fill:url(#my-svg-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#my-svg [data-look="neo"].icon-shape .icon-neo path{stroke:url(#my-svg-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#my-svg :root{--mermaid-font-family:"trebuchet ms",verdana,arial,sans-serif;}</style><g><marker id="my-svg_flowchart-v2-pointEnd" class="marker flowchart-v2" viewBox="0 0 10 10" refX="5" refY="5" markerUnits="userSpaceOnUse" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" class="arrowMarkerPath" style="stroke-width: 1; stroke-dasharray: 1, 0;"/></marker><marker id="my-svg_flowchart-v2-pointStart" class="marker flowchart-v2" viewBox="0 0 10 10" refX="4.5" refY="5" markerUnits="userSpaceOnUse" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 5 L 10 10 L 10 0 z" class="arrowMarkerPath" style="stroke-width: 1; stroke-dasharray: 1, 0;"/></marker><marker id="my-svg_flowchart-v2-pointEnd-margin" class="marker flowchart-v2" viewBox="0 0 11.5 14" refX="11.5" refY="7" markerUnits="userSpaceOnUse" markerWidth="10.5" markerHeight