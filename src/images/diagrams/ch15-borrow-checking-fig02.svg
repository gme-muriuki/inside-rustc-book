xt-inner-tspan" font-weight="normal"> created:</tspan><tspan font-style="normal" class="text-inner-tspan" font-weight="normal"> first</tspan><tspan font-style="normal" class="text-inner-tspan" font-weight="normal"> =</tspan><tspan font-style="normal" class="text-inner-tspan" font-weight="normal"> &amp;v[0]</tspan></tspan></text></g></g></g><g class="node default" id="my-svg-flowchart-U1-1" data-look="classic" transform="translate(349.52880859375, 105.5)"><rect class="basic label-container" style="" x="-143.4755859375" y="-20.5" width="286.951171875" height="41"/><g class="label" style="" transform="translate(0, -8.5)"><rect/><g><rect class="background" style="stroke: none"/><text y="-10.1" style=""><tspan class="text-outer-tspan row" x="0" y="-0.1em" dy="1.1em"><tspan font-style="normal" class="text-inner-tspan" font-weight="normal">use:</tspan><tspan font-style="normal" class="text-inner-tspan" font-weight="normal"> println!(first)</tspan><tspan font-style="normal" class="text-inner-tspan" font-weight="normal"> ←</tspan><tspan font-style="normal" class="text-inner-tspan" font-weight="normal"> last</tspan><tspan font-style="normal" class="text-inner-tspan" font-weight="normal"> use</tspan></tspan></text></g></g></g><g class="node default" id="my-svg-flowchart-LEX-3" data-look="classic" transform="translate(171.228515625, 205.5999984741211)"><rect class="basic label-container" style="" x="-163.228515625" y="-43.599998474121094" width="326.45703125" height="87.19999694824219"/><g class="label" style="" transform="translate(0, -31.599998474121094)"><rect/><g><rect class="background" style="stroke: none"/><text y="-10.1" style=""><tspan class="text-outer-tspan row" x="0" y="-0.1em" dy="1.1em"><tspan font-style="normal" class="text-inner-tspan" font-weight="normal">LEXICAL</tspan><tspan font-style="normal" class="text-inner-tspan" font-weight="normal"> (old):</tspan><tspan font-style="normal" class="text-inner-tspan" font-weight="normal"> region</tspan><tspan font-style="normal" class="text-inner-tspan" font-weight="normal"> runs</tspan><tspan font-style="normal" class="text-inner-tspan" font-weight="normal"> to</tspan><tspan font-style="normal" class="text-inner-tspan" font-weight="normal"> end</tspan><tspan font-style="normal" class="text-inner-tspan" font-weight="normal"> of</tspan></tspan><tspan class="text-outer-tspan row" x="0" y="1em" dy="1.1em"><tspan font-style="normal" class="text-inner-tspan" font-weight="normal">block</tspan></tspan><tspan class="text-outer-tspan row" x="0" y="2.1em" dy="1.1em"><tspan font-style="normal" class="text-inner-tspan" font-weight="normal">→</tspan><tspan font-style="normal" class="text-inner-tspan" font-weight="normal"> collides</tspan><tspan font-style="normal" class="text-inner-tspan" font-weight="normal"> with</tspan><tspan font-style="normal" class="text-inner-tspan" font-weight="normal"> v.push(4)</tspan><tspan font-style="normal" class="text-inner-tspan" font-weight="normal"> →</tspan><tspan font-style="normal" class="text-inner-tspan" font-weight="normal"> spurious</tspan></tspan><tspan class="text-outer-tspan row" x="0" y="3.2em" dy="1.1em"><tspan font-style="normal" class="text-inner-tspan" font-weight="normal">ERROR</tspan></tspan></text></g></g></g><g class="node default" id="my-svg-flowchart-NLL-5" data-look="classic" transform="translate(527.8291015625, 205.5999984741211)"><rect class="basic label-container" style="" x="-159.3720703125" y="-43.599998474121094" width="318.744140625" height="87.19999694824219"/><g class="label" style="" transform="translate(0, -31.599998474121094)"><rect/><g><rect class="background" style="stroke: none"/><text y="-10.1" style=""><tspan class="text-outer-tspan row" x="0" y="-0.1em" dy="1.1em"><tspan font-style="normal" class="text-inner-tspan" font-weight="normal">NLL</tspan><tspan font-style="normal" class="text-inner-tspan" font-weight="normal"> (now):</tspan><tspan font-style="normal" class="text-inner-tspan" font-weight="normal"> region</tspan><tspan font-style="normal" class="text-inner-tspan" font-weight="normal"> ends</tspan><tspan font-style="normal" class="text-inner-tspan" font-weight="normal"> at</tspan><tspan font-style="normal" class="text-inner-tspan" font-weight="normal"> last</tspan><tspan font-style="normal" class="text-inner-tspan" font-weight="normal"> use</tspan></tspan><tspan class="text-outer-tspan row" x="0" y="1em" dy="1.1em"><tspan font-style="normal" class="text-inner-tspan" font-weight="normal">(the</tspan><tspan font-style="normal" class="text-inner-tspan" font-weight="normal"> println!)</tspan></tspan><tspan class="text-outer-tspan row" x="0" y="2.1em" dy="1.1em"><tspan font-style="normal" class="text-inner-tspan" font-weight="normal">→</tspan><tspan font-style="normal" class="text-inner-tspan" font-weight="normal"> v.push(4)</tspan><tspan font-style="normal" class="text-inner-tspan" font-weight="normal"> is</tspan><tspan font-style="normal" class="text-inner-tspan" font-weight="normal"> outside</tspan><tspan font-style="normal" class="text-inner-tspan" font-weight="normal"> the</tspan><tspan font-style="normal" class="text-inner-tspan" font-weight="normal"> region</tspan><tspan font-style="normal" class="text-inner-tspan" font-weight="normal"> →</tspan></tspan><tspan class="text-outer-tspan row" x="0" y="3.2em" dy="1.1em"><tspan font-style="normal" class="text-inner-tspan" font-weight="normal">OK</tspan></tspan></text></g></g></g></g></g></g><defs><filter id="my-svg-drop-shadow" height="130%" width="130%"><feDropShadow dx="4" dy="4" stdDeviation="0" flood-opacity="0.06" flood-color="#000000"/></filter></defs><defs><filter id="my-svg-drop-shadow-small" height="150%" width="150%"><feDropShadow dx="2" dy="2" stdDeviation="0" flood-opacity="0.06" flood-color="#000000"/></filter></defs><linearGradient id="my-svg-gradient" gradientUnits="objectBoundingBox" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#1a1a1a" stop-opacity="1"/><stop offset="100%" stop-color="hsl(36, 2